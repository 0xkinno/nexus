[dependencies.orig-project]
default-features = false
package = "nexus"
path = "/root/nexus/contracts/nexus-sails"

[features]

[lib]
crate-type = ["cdylib"]
name = "nexus"

[package]
edition = "2024"
name = "nexus-wasm"
version = "0.1.0"

[patch]

[profile.dev]
opt-level = "z"

[profile.production]
inherits = "release"

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = "z"

[workspace]
